<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="robots" content="noindex, nofollow">
    <title>DIME Tipster | Professional Basketball Analysis & Tips</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkSlate: '#0a0f14',
                        dimeGreen: '#3e6b4d', 
                        dimeGold: '#d4af37',
                        dimeAccent: '#DB9C2A', 
                    },
                    animation: {
                        'bounce-heavy': 'bounceHeavy 0.8s infinite',
                        'spin-ball': 'spinBall 3s linear infinite',
                        'shadow-pulse': 'shadowPulse 0.8s infinite',
                    },
                    keyframes: {
                        bounceHeavy: {
                            '0%, 100%': { 
                                transform: 'translateY(-140%)', 
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)' 
                            },
                            '50%': { 
                                transform: 'translateY(0)', 
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)' 
                            },
                        },
                        spinBall: {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' },
                        },
                        shadowPulse: {
                            '0%, 100%': { 
                                transform: 'scale(0.6)', 
                                opacity: '0.2',
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)'
                            },
                            '50%': { 
                                transform: 'scale(1.2)', 
                                opacity: '0.8',
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)'
                            },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(circle at top left, #1a2e22 0%, #05070a 100%);
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(62, 107, 77, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .btn-telegram {
            background: linear-gradient(135deg, #2481cc, #1d6fa5);
            box-shadow: 0 4px 20px rgba(36, 129, 204, 0.4);
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Marquee Animation */
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-scroll {
            animation: scroll-left 40s linear infinite;
            display: flex;
            width: max-content;
        }
        .animate-scroll:hover {
            animation-play-state: paused;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const useLoadingProgress = (isActive, duration = 2800) => {
            const [progress, setProgress] = React.useState(0);
            
            React.useEffect(() => {
                if (!isActive) return;
                
                const startTime = Date.now();
                const interval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const newProgress = Math.min((elapsed / duration) * 100, 100);
                    setProgress(newProgress);
                    
                    if (elapsed >= duration) clearInterval(interval);
                }, 16); 
                
                return () => clearInterval(interval);
            }, [isActive, duration]);
            
            return progress;
        };

        // NEW: Structured format for you to easily insert actual logo URLs
        // Just replace the 'logo' url string with the path to your custom images (e.g. 'images/euroleague.png')
        const leagues = [
            { name: "EuroLeague", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=EL" },
            { name: "Liga ACB", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=ACB" },
            { name: "LBA", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=LBA" },
            { name: "LNB Pro A", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=LNB" },
            { name: "BBL", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=BBL" },
            { name: "BSL", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=BSL" },
            { name: "GBL", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=GBL" },
            { name: "NBL", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=NBL" },
            { name: "CBA", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=CBA" },
            { name: "FIBA World", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=FIBA" },
            { name: "EuroCup", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=CUP" },
            { name: "BCL", logo: "https://placehold.co/100x100/1a2e22/d4af37?text=BCL" }
        ];
        const doubledLeagues = [...leagues, ...leagues];

        const App = () => {
            const [data, setData] = React.useState({ stats: { roi: '...', units: '...' }, picks: [] });
            const [isLoading, setIsLoading] = React.useState(true);
            const progress = useLoadingProgress(isLoading);

            const scrollToAbout = () => {
                const aboutSection = document.getElementById('about-section');
                if (aboutSection) {
                    aboutSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };

            const getFlagIcon = (countryName) => {
                if (!countryName || countryName === "World") {
                    return <i className="fa-solid fa-globe text-dimeGold text-[12px] md:text-[14px] mr-1.5 md:mr-3 cursor-help drop-shadow-md" title="World / International"></i>;
                }
                
                const countryMap = {
                    'AFGHANISTAN': 'af', 'ALBANIA': 'al', 'ALGERIA': 'dz', 'ANDORRA': 'ad', 'ANGOLA': 'ao',
                    'ARGENTINA': 'ar', 'ARMENIA': 'am', 'AUSTRALIA': 'au', 'AUSTRIA': 'at', 'AZERBAIJAN': 'az',
                    'BAHAMAS': 'bs', 'BAHRAIN': 'bh', 'BANGLADESH': 'bd', 'BARBADOS': 'bb', 'BELARUS': 'by',
                    'BELGIUM': 'be', 'BELIZE': 'bz', 'BENIN': 'bj', 'BHUTAN': 'bt', 'BOLIVIA': 'bo',
                    'BOSNIA AND HERZEGOVINA': 'ba', 'BOSNIA': 'ba', 'BOTSWANA': 'bw', 'BRAZIL': 'br', 'BULGARIA': 'bg',
                    'BURKINA FASO': 'bf', 'BURUNDI': 'bi', 'CABO VERDE': 'cv', 'CAMBODIA': 'kh', 'CAMEROON': 'cm',
                    'CANADA': 'ca', 'CHAD': 'td', 'CHILE': 'cl', 'CHINA': 'cn', 'COLOMBIA': 'co',
                    'COMOROS': 'km', 'CONGO': 'cg', 'COSTA RICA': 'cr', 'CROATIA': 'hr', 'CUBA': 'cu',
                    'CYPRUS': 'cy', 'CZECH R.': 'cz', 'CZECHIA': 'cz', 'DENMARK': 'dk', 'DJIBOUTI': 'dj',
                    'DOMINICAN REPUBLIC': 'do', 'ECUADOR': 'ec', 'EGYPT': 'eg', 'EL SALVADOR': 'sv', 'ENGLAND': 'gb-eng',
                    'EQUATORIAL GUINEA': 'gq', 'ERITREA': 'er', 'ESTONIA': 'ee', 'ESWATINI': 'sz', 'ETHIOPIA': 'et',
                    'FIJI': 'fj', 'FINLAND': 'fi', 'FRANCE': 'fr', 'GABON': 'ga', 'GAMBIA': 'gm',
                    'GEORGIA': 'ge', 'GERMANY': 'de', 'GHANA': 'gh', 'GREECE': 'gr', 'GUATEMALA': 'gt',
                    'GUINEA': 'gn', 'GUYANA': 'gy', 'HAITI': 'ht', 'HONDURAS': 'hn', 'HUNGARY': 'hu',
                    'ICELAND': 'is', 'INDIA': 'in', 'INDONESIA': 'id', 'IRAN': 'ir', 'IRAQ': 'iq',
                    'IRELAND': 'ie', 'ISRAEL': 'il', 'ITALY': 'it', 'JAMAICA': 'jm', 'JAPAN': 'jp',
                    'JORDAN': 'jo', 'KAZAKHSTAN': 'kz', 'KENYA': 'ke', 'KOSOVO': 'xk', 'KUWAIT': 'kw',
                    'KYRGYZSTAN': 'kg', 'LAOS': 'la', 'LATVIA': 'lv', 'LEBANON': 'lb', 'LIBERIA': 'lr',
                    'LIBYA': 'ly', 'LIECHTENSTEIN': 'li', 'LITHUANIA': 'lt', 'LUXEMBOURG': 'lu', 'MADAGASCAR': 'mg',
                    'MALAWI': 'mw', 'MALAYSIA': 'my', 'MALDIVES': 'mv', 'MALI': 'ml', 'MALTA': 'mt',
                    'MEXICO': 'mx', 'MOLDOVA': 'md', 'MONACO': 'mc', 'MONGOLIA': 'mn', 'MONTENEGRO': 'me',
                    'MOROCCO': 'ma', 'MOZAMBIQUE': 'mz', 'MYANMAR': 'mm', 'NAMIBIA': 'na', 'NEPAL': 'np',
                    'NETHERLANDS': 'nl', 'NEW ZEALAND': 'nz', 'NICARAGUA': 'ni', 'NIGER': 'ne', 'NIGERIA': 'ng',
                    'NORTH MACEDONIA': 'mk', 'MACEDONIA': 'mk', 'NORWAY': 'no', 'OMAN': 'om', 'PAKISTAN': 'pk',
                    'PANAMA': 'pa', 'PARAGUAY': 'py', 'PERU': 'pe', 'PHILIPPINES': 'ph', 'POLAND': 'pl',
                    'PORTUGAL': 'pt', 'PUERTO RICO': 'pr', 'QATAR': 'qa', 'ROMANIA': 'ro', 'RUSSIA': 'ru', 'RWANDA': 'rw',
                    'SAUDI ARABIA': 'sa', 'SENEGAL': 'sn', 'SERBIA': 'rs', 'SINGAPORE': 'sg', 'SLOVAKIA': 'sk',
                    'SLOVENIA': 'si', 'SOMALIA': 'so', 'SOUTH AFRICA': 'za', 'SOUTH KOREA': 'kr', 'REPUBLIC OF KOREA': 'kr',
                    'KOREA REPUBLIC': 'kr', 'SPAIN': 'es', 'SRI LANKA': 'lk', 'SUDAN': 'sd', 'SWEDEN': 'se',
                    'SWITZERLAND': 'ch', 'SYRIA': 'sy', 'TAIWAN': 'tw', 'TAJIKISTAN': 'tj', 'TANZANIA': 'tz',
                    'THAILAND': 'th', 'TUNISIA': 'tn', 'TURKEY': 'tr', 'TÜRKİYE': 'tr', 'TURKMENISTAN': 'tm',
                    'UGANDA': 'ug', 'UKRAINE': 'ua', 'UNITED ARAB EMIRATES': 'ae', 'UAE': 'ae', 'UNITED KINGDOM': 'gb',
                    'UK': 'gb', 'USA': 'us', 'UNITED STATES': 'us', 'URUGUAY': 'uy', 'UZBEKISTAN': 'uz',
                    'VENEZUELA': 've', 'VIETNAM': 'vn', 'YEMEN': 'ye', 'ZAMBIA': 'zm', 'ZIMBABWE': 'zw',
                    'EUROPE': 'eu', 'INTERNATIONAL': 'un', 'WORLD': 'un'
                };

                const code = countryMap[countryName.toUpperCase().trim()];
                
                if (code) {
                    return <img src={`https://flagcdn.com/20x15/${code}.png`} alt={countryName} title={countryName} className="w-4 md:w-5 inline-block mr-1.5 md:mr-3 shadow-[0_2px_5px_rgba(0,0,0,0.5)] rounded-[2px] cursor-help border border-white/10" />;
                }
                
                return <i className="fa-solid fa-globe text-dimeGold text-[12px] md:text-[14px] mr-1.5 md:mr-3 cursor-help drop-shadow-md" title={countryName}></i>;
            };

            React.useEffect(() => {
                fetch('picks.json?v=' + new Date().getTime())
                    .then(res => res.json())
                    .then(json => {
                        if (json.stats && json.picks) {
                            setData(json);
                        } else {
                            setData({ stats: { roi: '+18.4%', units: '+32.1' }, picks: Array.isArray(json) ? json : [] });
                        }
                        setTimeout(() => setIsLoading(false), 2800); 
                    })
                    .catch(() => {
                        setTimeout(() => setIsLoading(false), 2800);
                    });
            }, []);

            if (isLoading) {
                return (
                    <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-darkSlate overflow-hidden px-6">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_rgba(62,107,77,0.15)_0%,_transparent_60%)]"></div>
                        
                        <div className="relative flex flex-col items-center z-10 w-full max-w-sm">
                            <div className="relative w-32 h-32 md:w-48 md:h-48 flex justify-center items-end mb-4">
                                <div className="absolute w-full h-full flex justify-center items-end animate-bounce-heavy">
                                    <i className="fa-solid fa-basketball text-[7rem] md:text-[10rem] text-[#ea580c] animate-spin-ball drop-shadow-[0_0_30px_rgba(62,107,77,0.8)]"></i>
                                </div>
                            </div>

                            <div className="w-20 md:w-28 h-2 md:h-3 bg-black rounded-[100%] blur-[2px] animate-shadow-pulse"></div>

                            <div className="mt-12 flex flex-col items-center w-full gap-6">
                                <img src="logo.png" alt="DIME Tipster Logo" className="h-24 md:h-36 w-auto object-contain logo-glow" />
                                
                                <div className="w-full flex flex-col gap-2 bg-black/40 p-4 rounded-xl border border-dimeGreen/20 shadow-[0_0_20px_rgba(62,107,77,0.15)]">
                                    <div className="flex justify-between w-full px-1 text-[10px] md:text-xs font-black tracking-widest uppercase text-gray-400">
                                        <span>Loading</span>
                                        <span className="text-dimeGold font-mono">{Math.floor(progress)}%</span>
                                    </div>
                                    
                                    <div className="relative w-full h-1.5 md:h-2 bg-black/80 rounded-full border border-white/5 overflow-visible shadow-inner">
                                        <div 
                                            className="absolute top-0 left-0 h-full bg-gradient-to-r from-dimeGreen to-[#4ade80] rounded-full shadow-[0_0_10px_rgba(74,222,128,0.4)] transition-all duration-75 ease-linear"
                                            style={{ width: `${progress}%` }}
                                        ></div>
                                        
                                        <div 
                                            className="absolute top-1/2 -translate-y-1/2 -ml-2.5 z-10 transition-all duration-75 ease-linear"
                                            style={{ left: `${progress}%` }}
                                        >
                                            <i className="fa-solid fa-basketball text-[#ea580c] text-[18px] md:text-[22px] drop-shadow-[0_0_8px_rgba(234,88,12,0.9)] animate-[spin_0.8s_linear_infinite]"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="relative overflow-x-hidden min-h-screen flex flex-col fade-in">
                    <nav className="w-full flex items-start pt-0 px-4 md:px-12 max-w-[1400px] mx-auto">
                        <div className="flex-1 flex justify-start items-center gap-4 md:gap-8 -mt-2 md:-mt-4">
                            <img src="logo.png" alt="DIME Logo" className="h-20 md:h-28 lg:h-40 w-auto object-contain logo-glow transition-transform duration-500 hover:scale-105" />
                            
                            {/* UPDATED: Nav font color is now gold */}
                            <button 
                                onClick={scrollToAbout} 
                                className="text-dimeGold drop-shadow-[0_0_8px_rgba(212,175,55,0.3
