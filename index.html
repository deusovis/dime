<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="robots" content="noindex, nofollow">
    <title>DIME Tipster | Professional Basketball Analysis & Tips</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkSlate: '#0a0f14',
                        dimeGreen: '#3e6b4d', 
                        dimeGold: '#d4af37',
                        dimeAccent: '#DB9C2A', 
                    },
                    animation: {
                        'bounce-heavy': 'bounceHeavy 0.8s infinite',
                        'spin-ball': 'spinBall 3s linear infinite',
                        'shadow-pulse': 'shadowPulse 0.8s infinite',
                    },
                    keyframes: {
                        bounceHeavy: {
                            '0%, 100%': { 
                                transform: 'translateY(-140%)', 
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)' 
                            },
                            '50%': { 
                                transform: 'translateY(0)', 
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)' 
                            },
                        },
                        spinBall: {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' },
                        },
                        shadowPulse: {
                            '0%, 100%': { 
                                transform: 'scale(0.6)', 
                                opacity: '0.2',
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)'
                            },
                            '50%': { 
                                transform: 'scale(1.2)', 
                                opacity: '0.8',
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)'
                            },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(circle at top left, #1a2e22 0%, #05070a 100%);
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(62, 107, 77, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .btn-telegram {
            background: linear-gradient(135deg, #2481cc, #1d6fa5);
            box-shadow: 0 4px 20px rgba(36, 129, 204, 0.4);
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-scroll {
            animation: scroll-left 50s linear infinite; 
            display: flex;
            width: max-content;
        }
        .animate-scroll:hover {
            animation-play-state: paused;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const useLoadingProgress = (isActive, duration = 1200) => {
            const [progress, setProgress] = React.useState(0);
            React.useEffect(() => {
                if (!isActive) return;
                const startTime = Date.now();
                const interval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const newProgress = Math.min((elapsed / duration) * 100, 100);
                    setProgress(newProgress);
                    if (elapsed >= duration) clearInterval(interval);
                }, 16); 
                return () => clearInterval(interval);
            }, [isActive, duration]);
            return progress;
        };

        const topLeagues = [
            { code: "eu", name: "EuroLeague" },
            { code: "es", name: "Liga ACB" },
            { code: "eu", name: "EuroCup" },
            { code: "tr", name: "BSL" },
            { code: "it", name: "LBA" },
            { code: "fr", name: "LNB Pro A" },
            { code: "de", name: "BBL" },
            { code: "gr", name: "GBL" },
            { code: "lt", name: "LKL" },
            { code: "rs", name: "KLS" },
            { code: "un", name: "ABA League" },
            { code: "au", name: "NBL" },
            { code: "eu", name: "BCL" },
            { code: "cn", name: "CBA" },
            { code: "jp", name: "B.League" },
            { code: "kr", name: "KBL" },
            { code: "ph", name: "PBA" },
            { code: "ar", name: "LNB Arg" },
            { code: "br", name: "NBB" },
            { code: "pr", name: "BSN" },
            { code: "pl", name: "PLK" },
            { code: "il", name: "Winner League" },
            { code: "lv", name: "LBL" },
            { code: "hr", name: "Premijer Liga" },
            { code: "si", name: "Liga Nova KBM" },
            { code: "me", name: "Prva A Liga" },
            { code: "ba", name: "Championship" },
            { code: "ca", name: "CEBL" },
            { code: "nz", name: "NZNBL" },
            { code: "do", name: "LNB" },
            { code: "ve", name: "SPB" },
            { code: "mx", name: "LNBP" },
            { code: "uy", name: "LUB" },
            { code: "be", name: "BNXT League" },
            { code: "nl", name: "BNXT League" },
            { code: "fi", name: "Korisliiga" },
            { code: "se", name: "SBL" },
            { code: "cz", name: "NBL" },
            { code: "ee", name: "KML" },
            { code: "gb", name: "BBL" },
            { code: "tw", name: "P. LEAGUE+" },
            { code: "lb", name: "FLB" }
        ];
        
        const doubledLeagues = [...topLeagues, ...topLeagues];

        const App = () => {
            const [data, setData] = React.useState({ stats: { roi: '...', units: '...' }, picks: [] });
            const [isLoading, setIsLoading] = React.useState(true);
            const progress = useLoadingProgress(isLoading);

            const scrollToAbout = () => {
                document.getElementById('about-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };

            const scrollToFAQ = () => {
                document.getElementById('faq-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };

            const getFlagIcon = (countryName) => {
                if (!countryName || countryName === "World") {
                    return <i className="fa-solid fa-globe text-dimeGold text-[12px] md:text-[14px] mr-1.5 md:mr-3 cursor-help drop-shadow-md" title="World / International"></i>;
                }
                const countryMap = {
                    'ARGENTINA': 'ar', 'AUSTRALIA': 'au', 'BRAZIL': 'br', 'CANADA': 'ca', 'CHINA': 'cn',
                    'CROATIA': 'hr', 'FRANCE': 'fr', 'GERMANY': 'de', 'GREECE': 'gr', 'ISRAEL': 'il',
                    'ITALY': 'it', 'JAPAN': 'jp', 'LITHUANIA': 'lt', 'MEXICO': 'mx', 'PHILIPPINES': 'ph',
                    'POLAND': 'pl', 'PUERTO RICO': 'pr', 'SERBIA': 'rs', 'SPAIN': 'es', 'TURKEY': 'tr'
                };
                const code = countryMap[countryName.toUpperCase().trim()];
                if (code) {
                    return <img src={`https://flagcdn.com/20x15/${code}.png`} alt={countryName} title={countryName} className="w-4 md:w-5 inline-block mr-1.5 md:mr-3 shadow-[0_2px_5px_rgba(0,0,0,0.5)] rounded-[2px] border border-white/10" />;
                }
                return <i className="fa-solid fa-globe text-dimeGold text-[12px] md:text-[14px] mr-1.5 md:mr-3 cursor-help drop-shadow-md" title={countryName}></i>;
            };

            React.useEffect(() => {
                fetch('picks.json?v=' + new Date().getTime())
                    .then(res => res.json())
                    .then(json => {
                        setData(json.stats ? json : { stats: { roi: '+18.4%', units: '+32.1' }, picks: Array.isArray(json) ? json : [] });
                        setTimeout(() => setIsLoading(false), 1200); 
                    }).catch(() => setTimeout(() => setIsLoading(false), 1200));
            }, []);

            if (isLoading) {
                return (
                    <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-darkSlate overflow-hidden px-6">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_rgba(62,107,77,0.15)_0%,_transparent_60%)]"></div>
                        <div className="relative flex flex-col items-center z-10 w-full max-w-sm">
                            <div className="relative w-32 h-32 md:w-48 md:h-48 flex justify-center items-end mb-4">
                                <div className="absolute w-full h-full flex justify-center items-end animate-bounce-heavy">
                                    <i className="fa-solid fa-basketball text-[7rem] md:text-[10rem] text-[#ea580c] animate-spin-ball drop-shadow-[0_0_30px_rgba(62,107,77,0.8)]"></i>
                                </div>
                            </div>
                            <div className="w-20 md:w-28 h-2 md:h-3 bg-black rounded-[100%] blur-[2px] animate-shadow-pulse"></div>
                            <div className="mt-12 flex flex-col items-center w-full gap-6">
                                <img src="logo.png" alt="DIME Tipster Logo" className="h-24 md:h-36 w-auto object-contain logo-glow" />
                                <div className="w-full flex flex-col gap-2 bg-black/40 p-4 rounded-xl border border-dimeGreen/20 shadow-[0_0_20px_rgba(62,107,77,0.15)]">
                                    <div className="flex justify-between w-full px-1 text-[10px] md:text-xs font-black tracking-widest uppercase text-gray-400">
                                        <span>Loading</span>
                                        <span className="text-dimeGold font-mono">{Math.floor(progress)}%</span>
                                    </div>
                                    <div className="relative w-full h-1.5 md:h-2 bg-black/80 rounded-full border border-white/5 overflow-visible shadow-inner">
                                        <div className="absolute top-0 left-0 h-full bg-gradient-to-r from-dimeGreen to-[#4ade80] rounded-full shadow-[0_0_10px_rgba(74,222,128,0.4)] transition-all duration-75 ease-linear" style={{ width: `${progress}%` }}></div>
                                        <div className="absolute top-1/2 -translate-y-1/2 -ml-2.5 z-10 transition-all duration-75 ease-linear" style={{ left: `${progress}%` }}>
                                            <i className="fa-solid fa-basketball text-[#ea580c] text-[18px] md:text-[22px] drop-shadow-[0_0_8px_rgba(234,88,12,0.9)] animate-[spin_0.8s_linear_infinite]"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="relative overflow-x-hidden min-h-screen flex flex-col fade-in">
                    <nav className="w-full flex items-start pt-4 md:pt-3 px-4 md:px-12 max-w-[1400px] mx-auto">
                        <div className="flex-1 flex justify-start">
                            <img src="logo.png" alt="DIME Logo" className="h-20 md:h-28 lg:h-40 w-auto object-contain logo-glow transition-transform duration-500 hover:scale-105" />
                            <button onClick={scrollToAbout} className="text-white hover:text-dimeGold font-black text-[10px] md:text-sm uppercase tracking-widest transition-colors border-b-2 border-transparent hover:border-dimeGold pb-0.5 ml-4 md:ml-8 mt-4 md:mt-5 lg:mt-8 self-start">About Us</button>
                            <button onClick={scrollToFAQ} className="text-white hover:text-dimeGold font-black text-[10px] md:text-sm uppercase tracking-widest transition-colors border-b-2 border-transparent hover:border-dimeGold pb-0.5 ml-4 md:ml-6 mt-4 md:mt-5 lg:mt-8 self-start">FAQ</button>
                        </div>
                        <div className="flex-1 flex justify-end pt-4 md:pt-4"> 
                            <a href="https://t.me/deimantas" target="_blank" className="btn-telegram flex items-center justify-center gap-2 text-white px-4 py-2 md:px-6 md:py-3 rounded-xl font-black text-xs md:text-sm uppercase tracking-tighter transition-transform active:scale-95 h-fit">
                                <i className="fa-brands fa-telegram text-lg md:text-xl"></i>
                                <span>Join Now</span>
                            </a>
                        </div>
                    </nav>

                    <main className="container mx-auto px-4 pt-8 md:pt-2 pb-10 max-w-6xl flex flex-col items-center flex-grow relative z-10">
                        {/* Title Section - NO negative margin on Mobile (mt-0), negative on Desktop (md:-mt-10) */}
                        <div className="text-center mb-10 md:mb-12 mt-0 md:-mt-10 lg:-mt-12 relative z-20">
                            <h1 className="text-3xl md:text-7xl font-black mb-6 leading-[1.1] tracking-tight uppercase text-white">
                                Beat the <span className="text-dimeAccent">Bookie</span> <br/> 
                                <span>with Precision</span>
                            </h1>
                            <div className="flex flex-col md:flex-row items-center justify-center gap-3 md:gap-4">
                                <div className="relative w-full md:w-auto bg-white/5 border border-white/10 text-white px-6 py-3 rounded-xl flex items-center justify-center font-bold backdrop-blur-md">
                                    <div className="absolute -top-3 -left-2 md:-top-4 md:-left-4 z-20 flex items-center justify-center transform -rotate-12 transition-transform hover:scale-110 hover:-rotate-6 cursor-pointer">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-md bg-red-500 opacity-60"></span>
                                        <span className="relative inline-flex items-center justify-center px-2.5 py-1 md:px-3 md:py-1 rounded-md bg-gradient-to-r from-red-600 via-red-500 to-orange-500 border border-red-300/60 shadow-[0_0_25px_rgba(239,68,68,0.9)]">
                                            <i className="fa-solid fa-bolt text-yellow-300 text-[10px] mr-1 animate-pulse drop-shadow-[0_0_5px_rgba(253,224,71,0.8)]"></i>
                                            <span className="text-white text-[10px] md:text-xs font-black uppercase tracking-widest drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">New!</span>
                                        </span>
                                    </div>
                                    <i className="fa-solid fa-circle-check text-green-500 mr-2 text-xl"></i>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 mr-2">Verified on</span>
                                    <a href="https://dime.blogabet.com" target="_blank" className="uppercase text-[10px] md:text-xs tracking-widest text-green-500 font-black hover:text-green-400">Blogabet</a>
                                </div>
                                <div className="w-full md:w-auto bg-dimeGreen/20 border border-dimeGreen/40 text-white px-6 py-3 rounded-xl flex items-center justify-center font-bold backdrop-blur-md">
                                    <i className="fa-solid fa-chart-line text-green-500 mr-2 text-xl"></i> 
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 mr-2">ROI:</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-green-500 mr-2 font-black">{data.stats.roi}</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 mr-2">|</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-green-500 font-black">{data.stats.units}</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 ml-2">Units</span>
                                </div>
                            </div>
                        </div>

                        {/* Pick Archive Table */}
                        <div className="w-full glass-card rounded-2xl md:rounded-[2rem] overflow-hidden relative mb-6">
                            <div className="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-dimeGreen/50 to-transparent"></div>
                            <div className="bg-gradient-to-r from-slate-900/80 to-black/80 px-4 py-5 md:px-10 md:py-8 border-b border-white/10 flex justify-between items-center backdrop-blur-xl relative z-10">
                                <h2 className="text-lg md:text-2xl font-black uppercase text-white tracking-wide">Archive</h2>
                                <span className="text-dimeAccent font-black text-[10px] md:text-sm tracking-widest uppercase">LAST 10 PICKS</span>
                            </div>
                            <div className="w-full relative z-10">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-black text-gray-400 text-[9px] md:text-xs uppercase tracking-[0.2em] font-black border-y border-white/10">
                                            <th className="px-3 py-4 md:px-10 md:py-6 w-[15%]">Date</th>
                                            <th className="px-2 py-4 md:px-10 md:py-6 w-[55%]">Pick</th>
                                            <th className="px-2 py-4 md:px-10 md:py-6 w-[15%] text-center align-middle">Odds</th>
                                            <th className="px-3 py-4 md:px-10 md:py-6 text-right w-[15%]">Result</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-gray-200">
                                        {data.picks.map((pick, index) => {
                                            const res = (pick.result || '').toUpperCase();
                                            const isWin = ['W','WON','WIN'].includes(res);
                                            const isLoss = ['L','LOST','LOSE','LOSS'].includes(res);
                                            return (
                                                <tr key={index} className="group border-b border-white/[0.04] last:border-0 hover:bg-gradient-to-r hover:from-white/[0.04] hover:to-transparent transition-all duration-300 ease-out">
                                                    <td className="px-3 py-4 md:px-10 md:py-7 text-[10px] md:text-sm text-gray-500 font-semibold tracking-wide whitespace-nowrap">{pick.date}</td>
                                                    <td className="px-2 py-4 md:px-10 md:py-7">
                                                        <div className="flex flex-col md:flex-row md:items-center font-black text-[11px] md:text-base uppercase tracking-wide gap-1 md:gap-3">
                                                            <div className="flex items-center leading-tight">
                                                                {getFlagIcon(pick.country)}
                                                                <span className="text-gray-100 drop-shadow-md">{pick.pick}</span>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="px-2 py-4 md:px-10 md:py-7 text-center align-middle">
                                                        <span className="font-black text-[10px] md:text-sm text-dimeGold font-mono">{pick.odds}</span>
                                                    </td>
                                                    <td className="px-3 py-4 md:px-10 md:py-7 text-right">
                                                        <span className={`px-2 py-1 md:px-6 md:py-2 rounded-lg md:rounded-xl font-black text-[10px] md:text-sm tracking-widest inline-block min-w-[36px] md:min-w-[70px] text-center border backdrop-blur-sm ${
                                                            isWin ? 'bg-green-500/10 text-green-400 border-green-500/30' : 
                                                            isLoss ? 'bg-red-500/10 text-red-400 border-red-500/30' : 'bg-gray-500/10 text-gray-400 border-gray-500/30'
                                                        }`}>{pick.result}</span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* About Section */}
                        <div id="about-section" className="w-full glass-card rounded-2xl md:rounded-[2rem] overflow-hidden relative px-6 py-12 md:px-16 md:py-16 flex flex-col items-center mt-2">
                            <h2 className="text-3xl md:text-5xl font-black text-white uppercase tracking-tight mb-6 text-center leading-tight">10+ Years of <br/> <span className="text-dimeAccent">Data-Driven</span> Dominance</h2>
                            <div className="w-16 h-1 bg-dimeGreen rounded-full mb-8"></div>
                            <p className="text-gray-100 text-sm md:text-lg text-center font-medium leading-relaxed mb-10 max-w-2xl">Welcome to DIME Tipster. For over a decade, we have systematically dismantled sportsbooks through deep-level basketball analysis.</p>
                            <div className="w-full flex flex-col md:flex-row gap-4 md:gap-6 mb-12">
                                <div className="flex-1 bg-gradient-to-br from-dimeGreen/20 to-black/60 border border-dimeGreen/30 rounded-2xl p-6 md:p-8 flex items-start gap-4">
                                    <div className="bg-dimeGreen/20 p-3 rounded-xl flex-shrink-0"><i className="fa-solid fa-crosshairs text-2xl text-green-400"></i></div>
                                    <div>
                                        <h4 className="text-white font-black uppercase tracking-wider mb-2 text-sm md:text-base">100+ Picks Per Month</h4>
                                        <p className="text-gray-300 text-xs md:text-sm">Receive a massive volume of high-value plays every single month.</p>
                                    </div>
                                </div>
                                <div className="flex-1 bg-gradient-to-br from-dimeAccent/20 to-black/60 border border-dimeAccent/30 rounded-2xl p-6 md:p-8 flex items-start gap-4">
                                    <div className="bg-dimeAccent/20 p-3 rounded-xl flex-shrink-0"><i className="fa-solid fa-hand-holding-dollar text-2xl text-dimeGold"></i></div>
                                    <div>
                                        <h4 className="text-white font-black uppercase tracking-wider mb-2 text-sm md:text-base">100% Risk-Free Guarantee</h4>
                                        <p className="text-gray-300 text-xs md:text-sm">If a month ends in negative profit, you receive a full refund.</p>
                                    </div>
                                </div>
                            </div>

                            {/* Equity Growth Section with Adjusted Mobile Spacing */}
                            <div className="w-full mt-4 bg-black/60 rounded-xl p-4 md:p-8 border border-white/10 relative overflow-hidden">
                                <h3 className="text-white text-sm md:text-base font-black uppercase tracking-widest mb-6 flex items-center gap-3">
                                    <i className="fa-solid fa-chart-area text-dimeGold"></i> Equity Growth
                                </h3>
                                <div className="w-full h-48 md:h-64 relative flex flex-col justify-end border-l border-b border-gray-700 pb-2 pl-2">
                                    <div className="absolute left-[-35px] top-0 h-full flex flex-col justify-between text-[8px] md:text-[10px] text-gray-500 font-mono py-2">
                                        <span>+2400u</span><span>+1200u</span><span>0u</span>
                                    </div>
                                    <svg className="w-full h-full" preserveAspectRatio="none" viewBox="0 0 1000 300">
                                        <defs><linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#22c55e" stopOpacity="0.4" /><stop offset="100%" stopColor="#22c55e" stopOpacity="0.0" /></linearGradient></defs>
                                        <path d="M 0,280 L 100,260 L 200,230 L 300,250 L 400,180 L 500,160 L 600,110 L 700,130 L 800,70 L 900,40 L 1000,20 L 1000,300 L 0,300 Z" fill="url(#gA)" />
                                        <path d="M 0,280 L 100,260 L 200,230 L 300,250 L 400,180 L 500,160 L 600,110 L 700,130 L 800,70 L 900,40 L 1000,20" fill="none" stroke="#22c55e" strokeWidth="6" />
                                        <circle cx="1000" cy="20" r="8" fill="#fff" stroke="#22c55e" strokeWidth="4" className="animate-pulse" />
                                    </svg>
                                </div>
                                <div className="flex justify-between text-[8px] md:text-[10px] text-gray-500 font-mono mt-3 ml-2">
                                    <span>2016</span><span>2018</span><span>2020</span><span>2022</span><span>2024</span><span className="text-dimeGold font-bold">2026</span>
                                </div>
                            </div>
                        </div>

                        {/* FAQ Section */}
                        <div id="faq-section" className="w-full glass-card rounded-2xl md:rounded-[2rem] overflow-hidden relative px-6 py-12 md:px-16 flex flex-col items-center mt-6">
                            <h2 className="text-3xl md:text-5xl font-black text-white uppercase tracking-tight mb-6 text-center leading-tight">Frequently Asked <span className="text-dimeAccent">Questions</span></h2>
                            <div className="w-16 h-1 bg-dimeGreen rounded-full mb-10"></div>
                            <div className="w-full max-w-4xl flex flex-col gap-4">
                                {[
                                    { q: "What is your track record?", a: "We have over 10 years of profitable dominance. Our entire history is 100% verified on Blogabet, showcasing over +2400 units since 2016.", i: "fa-chart-simple", c: "text-dimeGold" },
                                    { q: "How many picks will I receive?", a: "During the active season, you receive over 100 researched, high-value plays every single month.", i: "fa-crosshairs", c: "text-green-500" },
                                    { q: "Which leagues do you cover?", a: "We specialize in global basketball outside the US, covering over 40 top international leagues.", i: "fa-earth-americas", c: "text-blue-400" },
                                    { q: "How does the guarantee work?", a: "If a month ends in negative profit, you receive a full refund for your subscription.", i: "fa-hand-holding-dollar", c: "text-dimeAccent" }
                                ].map((item, idx) => (
                                    <div key={idx} className="bg-black/40 border border-white/5 rounded-xl p-5 md:p-6 hover:bg-black/60 transition-colors shadow-inner">
                                        <h4 className="text-white font-black uppercase tracking-wider mb-2 text-sm md:text-base flex items-center gap-3"><i className={`fa-solid ${item.i} ${item.c}`}></i> {item.q}</h4>
                                        <p className="text-gray-300 text-xs md:text-sm leading-relaxed pl-7 md:pl-8">{item.a}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Marquee Slider */}
                        <div className="w-full pt-8 mt-4 overflow-hidden">
                            <h3 className="text-center text-[10px] md:text-xs text-gray-500 uppercase tracking-[0.2em] font-black mb-6">Dominating Global Basketball Markets</h3>
                            <div className="relative flex overflow-x-hidden group bg-black/20 py-4 rounded-xl border border-white/5">
                                <div className="animate-scroll whitespace-nowrap flex items-center gap-4 md:gap-6 px-4">
                                    {doubledLeagues.map((league, idx) => (
                                        <div key={idx} className="flex items-center gap-2 md:gap-3 shrink-0 bg-white/5 border border-white/10 px-3 py-2 rounded-lg shadow-[0_2px_5px_rgba(0,0,0,0.5)]">
                                            <img src={`https://flagcdn.com/w40/${league.code}.png`} alt={league.name} className="w-5 md:w-6 h-auto rounded-[2px]" />
                                            <span className="text-gray-300 font-black text-[10px] md:text-xs tracking-widest uppercase whitespace-nowrap">{league.name}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <footer className="mt-auto py-10 w-full text-center opacity-70">
                            <p className="text-gray-500 text-[10px] md:text-xs font-black tracking-[0.3em] uppercase">© 2026 DIME TIPSTER</p>
                        </footer>
                    </main>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
