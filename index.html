<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="robots" content="noindex, nofollow">
    <title>DIME Tipster | Professional Basketball Analysis & Tips</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkSlate: '#0a0f14',
                        dimeGreen: '#3e6b4d', 
                        dimeGold: '#d4af37',
                        dimeAccent: '#DB9C2A', 
                    },
                    animation: {
                        'bounce-heavy': 'bounceHeavy 0.8s infinite',
                        'spin-ball': 'spinBall 3s linear infinite',
                        'shadow-pulse': 'shadowPulse 0.8s infinite',
                    },
                    keyframes: {
                        bounceHeavy: {
                            '0%, 100%': { 
                                transform: 'translateY(-140%)', 
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)' 
                            },
                            '50%': { 
                                transform: 'translateY(0)', 
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)' 
                            },
                        },
                        spinBall: {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' },
                        },
                        shadowPulse: {
                            '0%, 100%': { 
                                transform: 'scale(0.6)', 
                                opacity: '0.2',
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)'
                            },
                            '50%': { 
                                transform: 'scale(1.2)', 
                                opacity: '0.8',
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)'

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(circle at top left, #1a2e22 0%, #05070a 100%);
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(62, 107, 77, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .btn-telegram {
            background: linear-gradient(135deg, #2481cc, #1d6fa5);
            box-shadow: 0 4px 20px rgba(36, 129, 204, 0.4);
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Marquee Animation */
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-scroll {
            animation: scroll-left 50s linear infinite; 
            display: flex;
            width: max-content;
        }
        .animate-scroll:hover {
            animation-play-state: paused;
        }
    </style>
</head>
<body>

        const useLoadingProgress = (isActive, duration = 1200) => {
            const [progress, setProgress] = React.useState(0);
            
            React.useEffect(() => {
                if (!isActive) return;
                
                const startTime = Date.now();
                const interval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const newProgress = Math.min((elapsed / duration) * 100, 100);
                    setProgress(newProgress);
                    
                    if (elapsed >= duration) clearInterval(interval);
                }, 16); 
                
                return () => clearInterval(interval);
            }, [isActive, duration]);
            
            return progress;
        };

                                    <div className="text-sm text-gray-400 mb-6 font-medium">(Save ~30% annually)</div>
                                    <ul className="text-sm md:text-base text-gray-200 space-y-3 mb-8 w-full">
                                        <li className="flex items-center gap-2"><i className="fa-solid fa-check text-dimeAccent"></i> <span className="font-bold">Everything in Monthly</span></li>
                                        <li className="flex items-center gap-2"><i className="fa-solid fa-check text-dimeAccent"></i> 9 Months Full Access</li>
                                        <li className="flex items-center gap-2"><i className="fa-solid fa-check text-dimeAccent"></i> Priority Support</li>
                                    </ul>
                                    <a href="https://t.me/deimantas" target="_blank" className="w-full bg-gradient-to-r from-dimeAccent to-yellow-600 text-black py-3 rounded-xl font-black uppercase tracking-wide transition-transform hover:scale-105 active:scale-95 shadow-[0_0_15px_rgba(219,156,42,0.4)]">Select Season</a>
                                </div>
                            </div>
                        </div>

                        <div className="w-full glass-card rounded-2xl md:rounded-[2rem] overflow-hidden relative mb-6">
                            <div className="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-dimeGreen/50 to-transparent"></div>
                            
                            <div className="bg-gradient-to-r from-slate-900/80 to-black/80 px-4 py-5 md:px-10 md:py-8 border-b border-white/10 flex justify-between items-center backdrop-blur-xl relative z-10">
                                <h2 className="text-lg md:text-2xl font-black uppercase text-white tracking-wide">Archive</h2>
                                
                               <div className="flex items-center">
                                    <span className="text-dimeAccent font-black text-[10px] md:text-sm tracking-widest uppercase">LAST 10 PICKS</span>
                               </div>
                            </div>
                            
                            <div className="w-full relative z-10">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-black text-gray-400 text-[9px] md:text-xs uppercase tracking-[0.2em] md:tracking-[0.25em] font-black border-y border-white/10">
                                            <th className="px-3 py-4 md:px-10 md:py-6 w-[15%]">Date</th>
                                            <th className="px-2 py-4 md:px-10 md:py-6 w-[55%]">Pick</th>
                                            <th className="px-2 py-4 md:px-10 md:py-6 w-[15%] text-center align-middle">Odds</th>
                                            <th className="px-3 py-4 md:px-10 md:py-6 text-right w-[15%]">Result</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-gray-200">
                                        {data.picks.map((pick, index) => {
                                            const res = (pick.result || '').toUpperCase();
                                            const isWin = res === 'W' || res === 'WON' || res === 'WIN';
                                            const isLoss = res === 'L' || res === 'LOST' || res === 'LOSE' || res === 'LOSS';

                                            return (
                                                <tr key={index} className="group border-b border-white/[0.04] last:border-0 hover:bg-gradient-to-r hover:from-white/[0.04] hover:to-transparent transition-all duration-300 ease-out">
                                                    <td className="px-3 py-4 md:px-10 md:py-7 text-[10px] md:text-sm text-gray-500 font-semibold tracking-wide whitespace-nowrap group-hover:text-gray-400 transition-colors">
                                                        {pick.date}
                                                    </td>
                                                    <td className="px-2 py-4 md:px-10 md:py-7">
                                                        <div className="flex flex-col md:flex-row md:items-center font-black text-[11px] md:text-base uppercase tracking-wide gap-1 md:gap-3">
                                                            {(() => {
                                                                const pickStr = pick.pick || '';
                                                                const parts = pickStr.split(' ');
                                                                if (parts.length > 1) {
                                                                    const line = parts.pop();
                                                                    const team = parts.join(' ');
                                                                    return (
                                                                        <React.Fragment>
                                                                            <div className="flex items-center leading-tight">
                                                                                {getFlagIcon(pick.country)}
                                                                                <span className="text-gray-100 drop-shadow-md group-hover:text-white transition-colors line-clamp-2 md:line-clamp-none">
                                                                                    {team}
                                                                                </span>
                                                                            </div>
                                                                            <div className="pl-[22px] md:pl-0">
                                                                                <span className="inline-block text-[9px] md:text-xs text-dimeGold bg-dimeGold/10 px-1.5 py-0.5 md:px-2.5 md:py-1 rounded border border-dimeGold/20 font-bold tracking-widest shadow-sm">
                                                                                    {line}
                                                                                </span>
                                                                            </div>
                                                                        </React.Fragment>
                                                                    );
                                                                }
                                                                return (
                                                                    <div className="flex items-center leading-tight">
                                                                        {getFlagIcon(pick.country)}
                                                                        <span className="text-gray-100 drop-shadow-md group-hover:text-white transition-colors">{pickStr}</span>
                                                                    </div>
                                                                );
                                                            })()}
                                                        </div>
                                                    </td>
                                                    <td className="px-2 py-4 md:px-10 md:py-7 text-center align-middle">
                                                        <span className="font-black text-[10px] md:text-sm text-dimeGold font-mono block">
                                                            {pick.odds}
                                                        </span>
                                                    </td>
                                                    <td className="px-3 py-4 md:px-10 md:py-7 text-right">
                                                        <span className={`px-2 py-1 md:px-6 md:py-2 rounded-lg md:rounded-xl font-black text-[10px] md:text-sm tracking-widest inline-block min-w-[36px] md:min-w-[70px] text-center border backdrop-blur-sm transition-all duration-300 ${
                                                            isWin ? 'bg-green-500/10 text-green-400 border-green-500/30 shadow-[0_0_15px_rgba(34,197,94,0.15)] group-hover:shadow-[0_0_20px_rgba(34,197,94,0.3)]' : 
                                                            isLoss ? 'bg-red-500/10 text-red-400 border-red-500/30 shadow-[0_0_15px_rgba(239,68,68,0.15)] group-hover:shadow-[0_0_20px_rgba(239,68,68,0.3)]' : 
                                                            'bg-gray-500/10 text-gray-400 border-gray-500/30'
                                                        }`}>
                                                            {pick.result}
                                                        </span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                            
                            <div className="bg-gradient-to-t from-black/60 to-black/30 p-4 md:p-8 text-center border-t border-white/5 relative z-10">
                                <a href="https://dime.blogabet.com" target="_blank" rel="noopener noreferrer" className="group text-gray-400 hover:text-white transition-all duration-300 flex items-center justify-center gap-2 text-[9px] md:text-sm uppercase font-black tracking-widest">
                                    <span className="bg-green-500/20 rounded-full p-1 md:p-1.5 flex items-center justify-center group-hover:scale-110 transition-transform">
                                        <i className="fa-solid fa-check text-green-400 text-[10px] md:text-xs"></i>
                                    </span>
                                    See full verified history on Blogabet
                                </a>
                            </div>
                        </div>

                    </main>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
