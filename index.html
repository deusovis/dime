<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="robots" content="noindex, nofollow">
    <title>DIME | Professional Basketball Analysis & Tips</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkSlate: '#0a0f14',
                        dimeGreen: '#3e6b4d', 
                        dimeGold: '#d4af37',
                        dimeAccent: '#DB9C2A', 
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at top left, #1a2e22 0%, #05070a 100%);
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(62, 107, 77, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .btn-telegram {
            background: linear-gradient(135deg, #2481cc, #1d6fa5);
            box-shadow: 0 4px 20px rgba(36, 129, 204, 0.4);
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            const [data, setData] = React.useState({ stats: { roi: '...', units: '...' }, picks: [] });
            const [isLoading, setIsLoading] = React.useState(true);

            const getFlagIcon = (countryName) => {
                if (!countryName || countryName === "World") {
                    return <i className="fa-solid fa-globe text-dimeGold text-[12px] md:text-[14px] mr-1.5 md:mr-3 cursor-help drop-shadow-md" title="World / International"></i>;
                }
                
                const countryMap = {
                    'AFGHANISTAN': 'af', 'ALBANIA': 'al', 'ALGERIA': 'dz', 'ANDORRA': 'ad', 'ANGOLA': 'ao',
                    'ARGENTINA': 'ar', 'ARMENIA': 'am', 'AUSTRALIA': 'au', 'AUSTRIA': 'at', 'AZERBAIJAN': 'az',
                    'BAHAMAS': 'bs', 'BAHRAIN': 'bh', 'BANGLADESH': 'bd', 'BARBADOS': 'bb', 'BELARUS': 'by',
                    'BELGIUM': 'be', 'BELIZE': 'bz', 'BENIN': 'bj', 'BHUTAN': 'bt', 'BOLIVIA': 'bo',
                    'BOSNIA AND HERZEGOVINA': 'ba', 'BOSNIA': 'ba', 'BOTSWANA': 'bw', 'BRAZIL': 'br', 'BULGARIA': 'bg',
                    'BURKINA FASO': 'bf', 'BURUNDI': 'bi', 'CABO VERDE': 'cv', 'CAMBODIA': 'kh', 'CAMEROON': 'cm',
                    'CANADA': 'ca', 'CHAD': 'td', 'CHILE': 'cl', 'CHINA': 'cn', 'COLOMBIA': 'co',
                    'COMOROS': 'km', 'CONGO': 'cg', 'COSTA RICA': 'cr', 'CROATIA': 'hr', 'CUBA': 'cu',
                    'CYPRUS': 'cy', 'CZECH REPUBLIC': 'cz', 'CZECHIA': 'cz', 'DENMARK': 'dk', 'DJIBOUTI': 'dj',
                    'DOMINICAN REPUBLIC': 'do', 'ECUADOR': 'ec', 'EGYPT': 'eg', 'EL SALVADOR': 'sv', 'ENGLAND': 'gb-eng',
                    'EQUATORIAL GUINEA': 'gq', 'ERITREA': 'er', 'ESTONIA': 'ee', 'ESWATINI': 'sz', 'ETHIOPIA': 'et',
                    'FIJI': 'fj', 'FINLAND': 'fi', 'FRANCE': 'fr', 'GABON': 'ga', 'GAMBIA': 'gm',
                    'GEORGIA': 'ge', 'GERMANY': 'de', 'GHANA': 'gh', 'GREECE': 'gr', 'GUATEMALA': 'gt',
                    'GUINEA': 'gn', 'GUYANA': 'gy', 'HAITI': 'ht', 'HONDURAS': 'hn', 'HUNGARY': 'hu',
                    'ICELAND': 'is', 'INDIA': 'in', 'INDONESIA': 'id', 'IRAN': 'ir', 'IRAQ': 'iq',
                    'IRELAND': 'ie', 'ISRAEL': 'il', 'ITALY': 'it', 'JAMAICA': 'jm', 'JAPAN': 'jp',
                    'JORDAN': 'jo', 'KAZAKHSTAN': 'kz', 'KENYA': 'ke', 'KOSOVO': 'xk', 'KUWAIT': 'kw',
                    'KYRGYZSTAN': 'kg', 'LAOS': 'la', 'LATVIA': 'lv', 'LEBANON': 'lb', 'LIBERIA': 'lr',
                    'LIBYA': 'ly', 'LIECHTENSTEIN': 'li', 'LITHUANIA': 'lt', 'LUXEMBOURG': 'lu', 'MADAGASCAR': 'mg',
                    'MALAWI': 'mw', 'MALAYSIA': 'my', 'MALDIVES': 'mv', 'MALI': 'ml', 'MALTA': 'mt',
                    'MEXICO': 'mx', 'MOLDOVA': 'md', 'MONACO': 'mc', 'MONGOLIA': 'mn', 'MONTENEGRO': 'me',
                    'MOROCCO': 'ma', 'MOZAMBIQUE': 'mz', 'MYANMAR': 'mm', 'NAMIBIA': 'na', 'NEPAL': 'np',
                    'NETHERLANDS': 'nl', 'NEW ZEALAND': 'nz', 'NICARAGUA': 'ni', 'NIGER': 'ne', 'NIGERIA': 'ng',
                    'NORTH MACEDONIA': 'mk', 'MACEDONIA': 'mk', 'NORWAY': 'no', 'OMAN': 'om', 'PAKISTAN': 'pk',
                    'PANAMA': 'pa', 'PARAGUAY': 'py', 'PERU': 'pe', 'PHILIPPINES': 'ph', 'POLAND': 'pl',
                    'PORTUGAL': 'pt', 'PUERTO RICO': 'pr', 'QATAR': 'qa', 'ROMANIA': 'ro', 'RUSSIA': 'ru', 'RWANDA': 'rw',
                    'SAUDI ARABIA': 'sa', 'SENEGAL': 'sn', 'SERBIA': 'rs', 'SINGAPORE': 'sg', 'SLOVAKIA': 'sk',
                    'SLOVENIA': 'si', 'SOMALIA': 'so', 'SOUTH AFRICA': 'za', 'SOUTH KOREA': 'kr', 'REPUBLIC OF KOREA': 'kr',
                    'KOREA REPUBLIC': 'kr', 'SPAIN': 'es', 'SRI LANKA': 'lk', 'SUDAN': 'sd', 'SWEDEN': 'se',
                    'SWITZERLAND': 'ch', 'SYRIA': 'sy', 'TAIWAN': 'tw', 'TAJIKISTAN': 'tj', 'TANZANIA': 'tz',
                    'THAILAND': 'th', 'TUNISIA': 'tn', 'TURKEY': 'tr', 'TÜRKİYE': 'tr', 'TURKMENISTAN': 'tm',
                    'UGANDA': 'ug', 'UKRAINE': 'ua', 'UNITED ARAB EMIRATES': 'ae', 'UAE': 'ae', 'UNITED KINGDOM': 'gb',
                    'UK': 'gb', 'USA': 'us', 'UNITED STATES': 'us', 'URUGUAY': 'uy', 'UZBEKISTAN': 'uz',
                    'VENEZUELA': 've', 'VIETNAM': 'vn', 'YEMEN': 'ye', 'ZAMBIA': 'zm', 'ZIMBABWE': 'zw',
                    'EUROPE': 'eu', 'INTERNATIONAL': 'un', 'WORLD': 'un'
                };

                const code = countryMap[countryName.toUpperCase().trim()];
                
                if (code) {
                    return <img src={`https://flagcdn.com/20x15/${code}.png`} alt={countryName} title={countryName} className="w-4 md:w-5 inline-block mr-1.5 md:mr-3 shadow-[0_2px_5px_rgba(0,0,0,0.5)] rounded-[2px] cursor-help border border-white/10" />;
                }
                
                return <i className="fa-solid fa-globe text-dimeGold text-[12px] md:text-[14px] mr-1.5 md:mr-3 cursor-help drop-shadow-md" title={countryName}></i>;
            };

            React.useEffect(() => {
                fetch('picks.json?v=' + new Date().getTime())
                    .then(res => res.json())
                    .then(json => {
                        if (json.stats && json.picks) {
                            setData(json);
                        } else {
                            setData({ stats: { roi: '+18.4%', units: '+32.1' }, picks: Array.isArray(json) ? json : [] });
                        }
                        setIsLoading(false);
                    })
                    .catch(() => setIsLoading(false));
            }, []);

            return (
                <div className="relative overflow-x-hidden min-h-screen flex flex-col">
                    <nav className="w-full flex items-start pt-0 px-4 md:px-12 max-w-[1400px] mx-auto fade-in">
                        <div className="flex-1 flex justify-start -mt-2 md:-mt-4">
                            <img src="logo.png" alt="DIME Logo" className="h-20 md:h-28 lg:h-40 w-auto object-contain logo-glow transition-transform duration-500 hover:scale-105" />
                        </div>

                        <div className="flex-1 hidden md:flex flex-col items-center justify-start pt-4 lg:pt-8 opacity-90">
                            <span className="text-green-500 font-black text-[9px] md:text-xs tracking-[0.2em] uppercase mb-1 drop-shadow-[0_0_5px_rgba(34,197,94,0.5)]">Proven Gains</span>
                            <svg className="w-32 lg:w-48 h-10 lg:h-14" viewBox="0 0 100 40" preserveAspectRatio="none">
                                <path d="M0,40 L10,32 L20,35 L35,18 L50,22 L65,10 L80,15 L100,2 L100,40 L0,40 Z" fill="#22c55e" opacity="0.1"/>
                                <path d="M0,40 L10,32 L20,35 L35,18 L50,22 L65,10 L80,15 L100,2" fill="none" stroke="#22c55e" strokeWidth="2.5" />
                                <circle cx="100" cy="2" r="3" fill="#22c55e" className="animate-pulse" />
                            </svg>
                        </div>

                        <div className="flex-1 flex justify-end pt-2 md:pt-4"> 
                            <a href="https://t.me/deimantas" target="_blank" className="btn-telegram flex items-center justify-center gap-2 text-white px-4 py-2 md:px-6 md:py-3 rounded-xl font-black text-xs md:text-sm uppercase tracking-tighter transition-transform active:scale-95 h-fit">
                                <i className="fa-brands fa-telegram text-lg md:text-xl"></i>
                                <span>Join Now</span>
                            </a>
                        </div>
                    </nav>

                    <main className="container mx-auto px-4 pt-0 pb-10 max-w-6xl flex flex-col items-center flex-grow relative z-10">
                        <div className="text-center mb-10 md:mb-12 fade-in -mt-2 md:-mt-6">
                            <h1 className="text-3xl md:text-7xl font-black mb-6 leading-[1.1] tracking-tight uppercase text-white">
                                Beat the <span className="text-dimeAccent">Bookie</span> <br/> 
                                <span>with Precision</span>
                            </h1>
                            
                            <div className="flex flex-col md:flex-row items-center justify-center gap-3 md:gap-4">
                                <div className="w-full md:w-auto bg-white/5 border border-white/10 text-white px-6 py-3 rounded-xl flex items-center justify-center font-bold backdrop-blur-md">
                                    <i className="fa-solid fa-circle-check text-green-500 mr-2 text-xl shadow-green-500"></i>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 mr-2">Verified on</span>
                                    <a href="https://dime.blogabet.com" target="_blank" className="uppercase text-[10px] md:text-xs tracking-widest text-green-500 font-black">Blogabet</a>
                                </div>

                                <div className="w-full md:w-auto bg-dimeGreen/20 border border-dimeGreen/40 text-white px-6 py-3 rounded-xl flex items-center justify-center font-bold backdrop-blur-md">
                                    <i className="fa-solid fa-chart-line text-green-500 mr-2 text-xl"></i> 
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 mr-2">ROI:</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-green-500 mr-2 font-black drop-shadow-[0_0_8px_rgba(34,197,94,0.4)]">{data.stats.roi}</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 mr-2">|</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-green-500 font-black drop-shadow-[0_0_8px_rgba(34,197,94,0.4)]">{data.stats.units}</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 ml-2">Units</span>
                                </div>
                            </div>
                        </div>

                        <div className="w-full glass-card rounded-2xl md:rounded-[2rem] overflow-hidden fade-in relative">
                            {/* Decorative top glow */}
                            <div className="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-dimeGreen/50 to-transparent"></div>
                            
                            <div className="bg-gradient-to-r from-slate-900/80 to-black/80 px-4 py-5 md:px-10 md:py-8 border-b border-white/10 flex justify-center md:justify-between items-center backdrop-blur-xl relative z-10">
                                <h2 className="text-lg md:text-2xl font-black uppercase text-white tracking-wide">Results</h2>
                                
                                <div className="hidden md:flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-dimeAccent animate-pulse"></span>
                                    <span className="text-dimeAccent font-black text-sm tracking-widest uppercase">LAST 10 PICKS</span>
                                </div>
                            </div>
                            
                            <div className="w-full relative z-10">
                                {/* Removed min-w forcing to allow mobile stacking */}
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gradient-to-r from-slate-900 to-slate-900/90 text-gray-400 text-[9px] md:text-xs uppercase tracking-[0.2em] md:tracking-[0.25em] font-black border-b border-dimeGreen/20 shadow-md">
                                            <th className="px-3 py-4 md:px-10 md:py-6 w-[15%]">Date</th>
                                            <th className="px-2 py-4 md:px-10 md:py-6 w-[55%]">Pick</th>
                                            <th className="px-2 py-4 md:px-10 md:py-6 w-[15%] text-center md:text-left">Odds</th>
                                            <th className="px-3 py-4 md:px-10 md:py-6 text-right w-[15%]">Result</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-gray-200">
                                        {data.picks.map((pick, index) => {
                                            const res = (pick.result || '').toUpperCase();
                                            const isWin = res === 'W' || res === 'WON' || res === 'WIN';
                                            const isLoss = res === 'L' || res === 'LOST' || res === 'LOSE' || res === 'LOSS';

                                            return (
                                                <tr key={index} className="group border-b border-white/[0.04] last:border-0 hover:bg-gradient-to-r hover:from-white/[0.04] hover:to-transparent transition-all duration-300 ease-out">
                                                    <td className="px-3 py-4 md:px-10 md:py-7 text-[10px] md:text-sm text-gray-500 font-semibold tracking-wide whitespace-nowrap group-hover:text-gray-400 transition-colors">
                                                        {pick.date}
                                                    </td>
                                                    <td className="px-2 py-4 md:px-10 md:py-7">
                                                        <div className="flex flex-col md:flex-row md:items-center font-black text-[11px] md:text-base uppercase tracking-wide gap-1 md:gap-3">
                                                            {(() => {
                                                                const pickStr = pick.pick || '';
                                                                const parts = pickStr.split(' ');
                                                                if (parts.length > 1) {
                                                                    const line = parts.pop();
                                                                    const team = parts.join(' ');
                                                                    return (
                                                                        <React.Fragment>
                                                                            <div className="flex items-center leading-tight">
                                                                                {getFlagIcon(pick.country)}
                                                                                <span className="text-gray-100 drop-shadow-md group-hover:text-white transition-colors line-clamp-2 md:line-clamp-none">
                                                                                    {team}
                                                                                </span>
                                                                            </div>
                                                                            <div className="pl-[22px] md:pl-0">
                                                                                <span className="inline-block text-[9px] md:text-xs text-dimeGold bg-dimeGold/10 px-1.5 py-0.5 md:px-2.5 md:py-1 rounded border border-dimeGold/20 font-bold tracking-widest shadow-sm">
                                                                                    {line}
                                                                                </span>
                                                                            </div>
                                                                        </React.Fragment>
                                                                    );
                                                                }
                                                                return (
                                                                    <div className="flex items-center leading-tight">
                                                                        {getFlagIcon(pick.country)}
                                                                        <span className="text-gray-100 drop-shadow-md group-hover:text-white transition-colors">{pickStr}</span>
                                                                    </div>
                                                                );
                                                            })()}
                                                        </div>
                                                    </td>
                                                    <td className="px-2 py-4 md:px-10 md:py-7 text-center md:text-left">
                                                        <span className="inline-block bg-black/50 border border-white/5 rounded-md md:rounded-lg px-2 py-1 md:px-4 md:py-1.5 text-[10px] md:text-sm font-black text-dimeGold font-mono drop-shadow-[0_0_8px_rgba(212,175,55,0.3)] shadow-inner">
                                                            {pick.odds}
                                                        </span>
                                                    </td>
                                                    <td className="px-3 py-4 md:px-10 md:py-7 text-right">
                                                        <span className={`px-2 py-1 md:px-6 md:py-2 rounded-lg md:rounded-xl font-black text-[10px] md:text-sm tracking-widest inline-block min-w-[36px] md:min-w-[70px] text-center border backdrop-blur-sm transition-all duration-300 ${
                                                            isWin ? 'bg-green-500/10 text-green-400 border-green-500/30 shadow-[0_0_15px_rgba(34,197,94,0.15)] group-hover:shadow-[0_0_20px_rgba(34,197,94,0.3)]' : 
                                                            isLoss ? 'bg-red-500/10 text-red-400 border-red-500/30 shadow-[0_0_15px_rgba(239,68,68,0.15)] group-hover:shadow-[0_0_20px_rgba(239,68,68,0.3)]' : 
                                                            'bg-gray-500/10 text-gray-400 border-gray-500/30'
                                                        }`}>
                                                            {pick.result}
                                                        </span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                            
                            <div className="bg-gradient-to-t from-black/60 to-black/30 p-4 md:p-8 text-center border-t border-white/5 relative z-10">
                                <a href="https://dime.blogabet.com" target="_blank" rel="noopener noreferrer" className="group text-gray-400 hover:text-white transition-all duration-300 flex items-center justify-center gap-2 text-[9px] md:text-sm uppercase font-black tracking-widest">
                                    <span className="bg-green-500/20 rounded-full p-1 md:p-1.5 flex items-center justify-center group-hover:scale-110 transition-transform">
                                        <i className="fa-solid fa-check text-green-400 text-[10px] md:text-xs"></i>
                                    </span>
                                    <span>Full Verified History on <span className="text-green-400 group-hover:text-green-300 transition-colors drop-shadow-[0_0_8px_rgba(34,197,94,0.4)]">Blogabet</span></span>
                                </a>
                            </div>
                        </div>

                        <footer className="mt-auto py-10 w-full text-center opacity-70 hover:opacity-100 transition-opacity">
                            <p className="text-gray-500 text-[10px] md:text-xs font-black tracking-[0.3em] uppercase">© 2026 DIME TIPSTER</p>
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
