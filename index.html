<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="robots" content="noindex, nofollow">
    <title>DIME Tipster | Professional Basketball Analysis & Tips</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkSlate: '#0a0f14',
                        dimeGreen: '#3e6b4d', 
                        dimeGold: '#d4af37',
                        dimeAccent: '#DB9C2A', 
                    },
                    animation: {
                        'bounce-heavy': 'bounceHeavy 0.8s infinite',
                        'spin-ball': 'spinBall 3s linear infinite',
                        'shadow-pulse': 'shadowPulse 0.8s infinite',
                    },
                    keyframes: {
                        bounceHeavy: {
                            '0%, 100%': { 
                                transform: 'translateY(-140%)', 
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)' 
                            },
                            '50%': { 
                                transform: 'translateY(0)', 
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)' 
                            },
                        },
                        spinBall: {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' },
                        },
                        shadowPulse: {
                            '0%, 100%': { 
                                transform: 'scale(0.6)', 
                                opacity: '0.2',
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)'
                            },
                            '50%': { 
                                transform: 'scale(1.2)', 
                                opacity: '0.8',
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)'
                            },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(circle at top left, #1a2e22 0%, #05070a 100%);
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(62, 107, 77, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .btn-telegram {
            background: linear-gradient(135deg, #2481cc, #1d6fa5);
            box-shadow: 0 4px 20px rgba(36, 129, 204, 0.4);
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const useLoadingProgress = (isActive, duration = 1200) => {
            const [progress, setProgress] = React.useState(0);
            
            React.useEffect(() => {
                if (!isActive) return;
                
                const startTime = Date.now();
                const interval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const newProgress = Math.min((elapsed / duration) * 100, 100);
                    setProgress(newProgress);
                    
                    if (elapsed >= duration) clearInterval(interval);
                }, 16); 
                
                return () => clearInterval(interval);
            }, [isActive, duration]);
            
            return progress;
        };

        const App = () => {
            const [data, setData] = React.useState({ stats: { roi: '...', picks: '...' }, picks: [] });
            const [isLoading, setIsLoading] = React.useState(true);
            const progress = useLoadingProgress(isLoading);

            const scrollToSection = (id) => {
                const section = document.getElementById(id);
                if (section) {
                    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };

            const getFlagIcon = (countryName) => {
                if (!countryName || countryName === "World") {
                    return <i className="fa-solid fa-globe text-dimeGold text-[12px] md:text-[14px] mr-1.5 md:mr-3 cursor-help drop-shadow-md" title="World / International"></i>;
                }
                
                const countryMap = {
                    'ARGENTINA': 'ar', 'AUSTRALIA': 'au', 'BRAZIL': 'br', 'CANADA': 'ca', 'CHINA': 'cn', 
                    'CROATIA': 'hr', 'FRANCE': 'fr', 'GERMANY': 'de', 'GREECE': 'gr', 'ITALY': 'it', 
                    'JAPAN': 'jp', 'LITHUANIA': 'lt', 'MEXICO': 'mx', 'NETHERLANDS': 'nl', 'PHILIPPINES': 'ph', 
                    'POLAND': 'pl', 'SERBIA': 'rs', 'SPAIN': 'es', 'TURKEY': 'tr', 'USA': 'us', 'EUROPE': 'eu'
                };

                const code = countryMap[countryName.toUpperCase().trim()];
                if (code) {
                    return <img src={`https://flagcdn.com/20x15/${code}.png`} alt={countryName} className="w-4 md:w-5 inline-block mr-1.5 md:mr-3 shadow-[0_2px_5px_rgba(0,0,0,0.5)] rounded-[2px]" />;
                }
                return <i className="fa-solid fa-globe text-dimeGold text-[12px] md:text-[14px] mr-1.5 md:mr-3"></i>;
            };

            React.useEffect(() => {
                fetch('picks.json?v=' + new Date().getTime())
                    .then(res => res.json())
                    .then(json => {
                        setData({ stats: json.stats || { roi: '+18.4%', picks: '372' }, picks: json.picks || [] });
                        setTimeout(() => setIsLoading(false), 1200); 
                    })
                    .catch(() => {
                        setData({ stats: { roi: '+18.4%', picks: '372' }, picks: [] });
                        setTimeout(() => setIsLoading(false), 1200);
                    });
            }, []);

            if (isLoading) {
                return (
                    <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-darkSlate overflow-hidden px-6">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_rgba(62,107,77,0.15)_0%,_transparent_60%)]"></div>
                        <div className="relative flex flex-col items-center z-10 w-full max-w-sm">
                            <div className="relative w-32 h-32 md:w-48 md:h-48 flex justify-center items-end mb-4">
                                <div className="absolute w-full h-full flex justify-center items-end animate-bounce-heavy">
                                    <i className="fa-solid fa-basketball text-[7rem] md:text-[10rem] text-[#ea580c] animate-spin-ball drop-shadow-[0_0_30px_rgba(62,107,77,0.8)]"></i>
                                </div>
                            </div>
                            <div className="w-20 md:w-28 h-2 md:h-3 bg-black rounded-[100%] blur-[2px] animate-shadow-pulse"></div>
                            <div className="mt-12 flex flex-col items-center w-full gap-6">
                                <img src="logo.png" alt="DIME Tipster Logo" className="h-24 md:h-36 w-auto object-contain logo-glow" />
                                <div className="w-full flex flex-col gap-2 bg-black/40 p-4 rounded-xl border border-dimeGreen/20">
                                    <div className="flex justify-between w-full px-1 text-[10px] md:text-xs font-black tracking-widest uppercase text-gray-400">
                                        <span>Loading</span>
                                        <span className="text-dimeGold font-mono">{Math.floor(progress)}%</span>
                                    </div>
                                    <div className="relative w-full h-1.5 md:h-2 bg-black/80 rounded-full border border-white/5 overflow-visible">
                                        <div className="absolute top-0 left-0 h-full bg-gradient-to-r from-dimeGreen to-[#4ade80] rounded-full" style={{ width: `${progress}%` }}></div>
                                        <div className="absolute top-1/2 -translate-y-1/2 -ml-2.5 z-10" style={{ left: `${progress}%` }}>
                                            <i className="fa-solid fa-basketball text-[#ea580c] text-[18px] md:text-[22px] drop-shadow-[0_0_8px_rgba(234,88,12,0.9)] animate-[spin_0.8s_linear_infinite]"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="relative overflow-x-hidden min-h-screen flex flex-col fade-in">
                    <nav className="w-full flex items-start pt-1 md:pt-3 px-4 md:px-12 max-w-[1400px] mx-auto">
                        <div className="flex-1 flex justify-start">
                            <img src="logo.png" alt="DIME Logo" className="h-20 md:h-28 lg:h-40 w-auto object-contain logo-glow" />
                            <button onClick={() => scrollToSection('about-section')} className="text-white hover:text-dimeGold font-black text-[10px] md:text-sm uppercase tracking-widest ml-4 md:ml-8 mt-4 md:mt-5 lg:mt-8 self-start">About Us</button>
                            <button onClick={() => scrollToSection('plans-section')} className="text-white hover:text-dimeGold font-black text-[10px] md:text-sm uppercase tracking-widest ml-4 md:ml-6 mt-4 md:mt-5 lg:mt-8 self-start">Plans</button>
                        </div>
                        <div className="flex-1 flex justify-end pt-2 md:pt-4"> 
                            <a href="https://t.me/deimantas" target="_blank" className="btn-telegram flex items-center justify-center gap-2 text-white px-4 py-2 md:px-6 md:py-3 rounded-xl font-black text-xs md:text-sm uppercase tracking-tighter transition-transform active:scale-95 h-fit">
                                <i className="fa-brands fa-telegram text-lg md:text-xl"></i>
                                <span>Join Now</span>
                            </a>
                        </div>
                    </nav>

                    <main className="container mx-auto px-4 pt-0 md:pt-2 pb-10 max-w-6xl flex flex-col items-center flex-grow relative z-10">
                        <div className="text-center mb-10 md:mb-12 mt-6 md:-mt-10 lg:-mt-12 relative z-20">
                            <h1 className="text-3xl md:text-7xl font-black mb-6 leading-[1.1] tracking-tight uppercase text-white">Beat the <span className="text-dimeAccent">Bookie</span> <br/> with Precision</h1>
                            <div className="flex flex-col md:flex-row items-center justify-center gap-3 md:gap-4">
                                <div className="relative w-full md:w-auto bg-white/5 border border-white/10 text-white px-6 py-3 rounded-xl flex items-center justify-center font-bold">
                                    <i className="fa-solid fa-circle-check text-green-500 mr-2 text-xl"></i>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 mr-2">Verified on</span>
                                    <a href="https://dime.blogabet.com" target="_blank" className="uppercase text-[10px] md:text-xs tracking-widest text-green-500 font-black">Blogabet</a>
                                </div>
                                <div className="w-full md:w-auto bg-dimeGreen/20 border border-dimeGreen/40 text-white px-6 py-3 rounded-xl flex items-center justify-center font-bold">
                                    <i className="fa-solid fa-chart-line text-green-500 mr-2 text-xl"></i> 
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 mr-2">ROI:</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-green-500 mr-2 font-black">{data.stats.roi}</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 mr-2">|</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-green-500 font-black">{data.stats.picks}</span>
                                    <span className="uppercase text-[10px] md:text-xs tracking-widest text-gray-400 ml-2">Picks</span>
                                </div>
                            </div>
                        </div>

                        <div id="plans-section" className="w-full glass-card rounded-2xl md:rounded-[2rem] overflow-hidden relative mb-12">
                            <div className="bg-gradient-to-r from-slate-900/80 to-black/80 px-4 py-5 md:px-10 md:py-8 border-b border-white/10 flex justify-center items-center">
                                <h2 className="text-xl md:text-3xl font-black uppercase text-white tracking-wide">Choose Your Plan</h2>
                            </div>
                            
                            <div className="p-6 md:p-10 flex flex-col md:flex-row gap-6 md:gap-10 justify-center items-stretch">
                                {/* Monthly Plan */}
                                <div className="flex-1 bg-white/5 border border-white/10 rounded-2xl p-6 md:p-8 flex flex-col items-center text-center hover:bg-white/10 transition-colors">
                                    <h3 className="text-lg md:text-xl font-bold text-gray-300 uppercase tracking-widest mb-2">Monthly</h3>
                                    <div className="text-4xl md:text-5xl font-black text-white mb-6">$79.00<span className="text-sm text-gray-400 font-normal">/mo</span></div>
                                    <ul className="text-sm md:text-base text-gray-400 space-y-3 mb-8 w-full flex-grow">
                                        <li className="flex items-center gap-2"><i className="fa-solid fa-check text-green-500"></i> Full Access to Picks</li>
                                        <li className="flex items-center gap-2"><i className="fa-solid fa-check text-green-500"></i> Daily Analysis</li>
                                        <li className="flex items-center gap-2"><i className="fa-solid fa-check text-green-500"></i> Telegram Community</li>
                                    </ul>
                                    <a href="https://t.me/deimantas" target="_blank" className="w-full btn-telegram py-3 rounded-xl font-bold uppercase tracking-wide text-white transition-transform hover:scale-105 active:scale-95">Select Monthly</a>
                                </div>

                                {/* Season Plan */}
                                <div className="flex-1 bg-gradient-to-b from-dimeGreen/20 to-black/40 border border-dimeGreen/50 rounded-2xl p-6 md:p-8 flex flex-col items-center text-center relative overflow-hidden shadow-[0_0_30px_rgba(62,107,77,0.3)] hover:shadow-[0_0_40px_rgba(62,107,77,0.5)] transition-shadow">
                                    <div className="absolute top-4 right-4 bg-dimeAccent text-black text-[10px] md:text-xs font-black uppercase tracking-widest px-3 py-1 rounded-full">Best Value</div>
                                    <h3 className="text-lg md:text-xl font-bold text-dimeAccent uppercase tracking-widest mb-2">Season Pass</h3>
                                    <div className="text-4xl md:text-5xl font-black text-white mb-2">$499.00</div>
                                    <div className="text-sm text-gray-400 mb-6 font-medium">(Save ~30% annually)</div>
                                    <ul className="text-sm md:text-base text-gray-200 space-y-3 mb-8 w-full flex-grow">
                                        <li className="flex items-center gap-2"><i className="fa-solid fa-check text-dimeAccent"></i> <span className="font-bold">Everything in Monthly</span></li>
                                        <li className="flex items-center gap-2"><i className="fa-solid fa-check text-dimeAccent"></i> 9 Months Full Access</li>
                                        <li className="flex items-center gap-2"><i className="fa-solid fa-check text-dimeAccent"></i> Priority Support</li>
                                    </ul>
                                    <a href="https://t.me/deimantas" target="_blank" className="w-full bg-gradient-to-r from-dimeAccent to-yellow-600 text-black py-3 rounded-xl font-black uppercase tracking-wide transition-transform hover:scale-105 active:scale-95">Select Season</a>
                                </div>
                            </div>
                        </div>

                        <div className="w-full glass-card rounded-2xl md:rounded-[2rem] overflow-hidden relative mb-6">
                            <div className="bg-gradient-to-r from-slate-900/80 to-black/80 px-4 py-5 md:px-10 md:py-8 border-b border-white/10 flex justify-between items-center">
                                <h2 className="text-lg md:text-2xl font-black uppercase text-white tracking-wide">Archive</h2>
                                <span className="text-dimeAccent font-black text-[10px] md:text-sm tracking-widest uppercase">LAST 10 PICKS</span>
                            </div>
                            <div className="w-full overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-black text-gray-400 text-[9px] md:text-xs uppercase tracking-[0.2em] font-black border-y border-white/10">
                                            <th className="px-3 py-4 md:px-10 md:py-6">Date</th>
                                            <th className="px-2 py-4 md:px-10 md:py-6">Pick</th>
                                            <th className="px-2 py-4 md:px-10 md:py-6 text-center">Odds</th>
                                            <th className="px-3 py-4 md:px-10 md:py-6 text-right">Result</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-gray-200">
                                        {data.picks.map((pick, index) => (
                                            <tr key={index} className="border-b border-white/[0.04] hover:bg-white/[0.04]">
                                                <td className="px-3 py-4 md:px-10 md:py-7 text-[10px] md:text-sm text-gray-500">{pick.date}</td>
                                                <td className="px-2 py-4 md:px-10 md:py-7">
                                                    <div className="flex items-center font-black text-[11px] md:text-base uppercase tracking-wide">
                                                        {getFlagIcon(pick.country)}
                                                        <span>{pick.pick}</span>
                                                    </div>
                                                </td>
                                                <td className="px-2 py-4 md:px-10 md:py-7 text-center font-black">{pick.odds}</td>
                                                <td className="px-3 py-4 md:px-10 md:py-7 text-right uppercase font-black">{pick.result}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
