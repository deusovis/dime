<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="robots" content="noindex, nofollow">
    <title>DIME Tipster | Professional Basketball Analysis & Tips</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkSlate: '#0a0f14',
                        dimeGreen: '#3e6b4d', 
                        dimeGold: '#d4af37',
                        dimeAccent: '#DB9C2A', 
                    },
                    animation: {
                        'bounce-heavy': 'bounceHeavy 0.8s infinite',
                        'spin-ball': 'spinBall 3s linear infinite',
                        'shadow-pulse': 'shadowPulse 0.8s infinite',
                    },
                    keyframes: {
                        bounceHeavy: {
                            '0%, 100%': { 
                                transform: 'translateY(-140%)', 
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)' 
                            },
                            '50%': { 
                                transform: 'translateY(0)', 
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)' 
                            },
                        },
                        spinBall: {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' },
                        },
                        shadowPulse: {
                            '0%, 100%': { 
                                transform: 'scale(0.6)', 
                                opacity: '0.2',
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)'
                            },
                            '50%': { 
                                transform: 'scale(1.2)', 
                                opacity: '0.8',
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)'
                            },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(circle at top left, #1a2e22 0%, #05070a 100%);
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(62, 107, 77, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .btn-telegram {
            background: linear-gradient(135deg, #2481cc, #1d6fa5);
            box-shadow: 0 4px 20px rgba(36, 129, 204, 0.4);
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-scroll {
            animation: scroll-left 25s linear infinite; 
            display: flex;
            width: max-content;
        }
        .animate-scroll:hover {
            animation-play-state: paused;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const useLoadingProgress = (isActive, duration = 1200) => {
            const [progress, setProgress] = React.useState(0);
            
            React.useEffect(() => {
                if (!isActive) return;
                const startTime = Date.now();
                const interval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const newProgress = Math.min((elapsed / duration) * 100, 100);
                    setProgress(newProgress);
                    if (elapsed >= duration) clearInterval(interval);
                }, 16); 
                return () => clearInterval(interval);
            }, [isActive, duration]);
            
            return progress;
        };

        const topLeagues = [
            { name: "NBA", logo: "https://ui-avatars.com/api/?name=NBA&background=ffffff&color=0a0f14&bold=true" },
            { name: "EuroLeague", logo: "https://ui-avatars.com/api/?name=EL&background=ffffff&color=0a0f14&bold=true" },
            { name: "Liga ACB", logo: "https://ui-avatars.com/api/?name=ACB&background=ffffff&color=0a0f14&bold=true" },
            { name: "LBA Italy", logo: "https://ui-avatars.com/api/?name=LBA&background=ffffff&color=0a0f14&bold=true" },
            { name: "LNB Pro A", logo: "https://ui-avatars.com/api/?name=LNB&background=ffffff&color=0a0f14&bold=true" },
            { name: "BBL Germany", logo: "https://ui-avatars.com/api/?name=BBL&background=ffffff&color=0a0f14&bold=true" },
            { name: "BSL Turkey", logo: "https://ui-avatars.com/api/?name=BSL&background=ffffff&color=0a0f14&bold=true" },
            { name: "GBL Greece", logo: "https://ui-avatars.com/api/?name=GBL&background=ffffff&color=0a0f14&bold=true" },
            { name: "NBL Australia", logo: "https://ui-avatars.com/api/?name=NBL&background=ffffff&color=0a0f14&bold=true" },
            { name: "CBA China", logo: "https://ui-avatars.com/api/?name=CBA&background=ffffff&color=0a0f14&bold=true" },
            { name: "FIBA", logo: "https://ui-avatars.com/api/?name=FIBA&background=ffffff&color=0a0f14&bold=true" },
            { name: "EuroCup", logo: "https://ui-avatars.com/api/?name=EC&background=ffffff&color=0a0f14&bold=true" },
            { name: "BCL", logo: "https://ui-avatars.com/api/?name=BCL&background=ffffff&color=0a0f14&bold=true" },
            { name: "ABA League", logo: "https://ui-avatars.com/api/?name=ABA&background=ffffff&color=0a0f14&bold=true" },
            { name: "LKL", logo: "https://ui-avatars.com/api/?name=LKL&background=ffffff&color=0a0f14&bold=true" }
        ];
        const doubledLeagues = [...topLeagues, ...topLeagues];

        const App = () => {
            const [data, setData] = React.useState({ stats: { roi: '...', units: '...' }, picks: [] });
            const [isLoading, setIsLoading] = React.useState(true);
            const progress = useLoadingProgress(isLoading);

            const scrollToAbout = () => {
                const aboutSection = document.getElementById('about-section');
                if (aboutSection) aboutSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };

            const getFlagIcon = (countryName) => {
                if (!countryName || countryName === "World") return <i className="fa-solid fa-globe text-dimeGold text-[12px] md:text-[14px] mr-1.5 md:mr-3"></i>;
                const countryMap = { 'USA': 'us', 'SPAIN': 'es', 'GERMANY': 'de', 'FRANCE': 'fr', 'ITALY': 'it', 'GREECE': 'gr', 'TURKEY': 'tr', 'LITHUANIA': 'lt', 'SERBIA': 'rs', 'AUSTRALIA': 'au', 'CHINA': 'cn', 'JAPAN': 'jp', 'BRAZIL': 'br', 'ARGENTINA': 'ar' };
                const code = countryMap[countryName.toUpperCase().trim()];
                if (code) return <img src={`https://flagcdn.com/20x15/${code}.png`} className="w-4 md:w-5 inline-block mr-1.5 md:mr-3 rounded-[1px] border border-white/10" />;
                return <i className="fa-solid fa-globe text-dimeGold text-[12px] md:text-[14px] mr-1.5 md:mr-3"></i>;
            };

            React.useEffect(() => {
                fetch('picks.json?v=' + new Date().getTime())
                    .then(res => res.json())
                    .then(json => {
                        setData(json.stats && json.picks ? json : { stats: { roi: '+18.4%', units: '+32.1' }, picks: Array.isArray(json) ? json : [] });
                        setTimeout(() => setIsLoading(false), 1200); 
                    })
                    .catch(() => setTimeout(() => setIsLoading(false), 1200));
            }, []);

            if (isLoading) {
                return (
                    <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-darkSlate">
                        <div className="relative flex flex-col items-center z-10 w-full max-w-sm">
                            <div className="relative w-32 h-32 md:w-48 md:h-48 flex justify-center items-end mb-4">
                                <div className="absolute w-full h-full flex justify-center items-end animate-bounce-heavy">
                                    <i className="fa-solid fa-basketball text-[7rem] md:text-[10rem] text-[#ea580c] animate-spin-ball"></i>
                                </div>
                            </div>
                            <div className="mt-12 flex flex-col items-center w-full gap-6">
                                <img src="logo.png" alt="DIME Logo" className="h-24 md:h-36 w-auto" />
                                <div className="w-full bg-black/40 p-4 rounded-xl border border-dimeGreen/20">
                                    <div className="flex justify-between w-full text-[10px] uppercase text-gray-400">
                                        <span>Loading</span>
                                        <span className="text-dimeGold">{Math.floor(progress)}%</span>
                                    </div>
                                    <div className="relative w-full h-1.5 bg-black/80 rounded-full mt-2">
                                        <div className="h-full bg-dimeGreen rounded-full" style={{ width: `${progress}%` }}></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="relative min-h-screen flex flex-col fade-in">
                    <nav className="w-full flex items-start pt-0 px-4 md:px-12 max-w-[1400px] mx-auto">
                        <div className="flex-1 flex justify-start items-start">
                            <img src="logo.png" alt="DIME Logo" className="h-20 md:h-28 lg:h-40 w-auto object-contain logo-glow transition-transform duration-500 hover:scale-105 -mt-2 md:-mt-4" />
                            
                            {/* Corrected vertical alignment to match center column */}
                            <div className="pt-4 lg:pt-8 ml-4 md:ml-8">
                                <button onClick={scrollToAbout} className="text-white hover:text-dimeGold font-black text-[10px] md:text-sm uppercase tracking-widest transition-all border-b-2 border-transparent hover:border-dimeGold pb-1">
                                    About Us
                                </button>
                            </div>
                        </div>

                        <div className="flex-1 hidden md:flex flex-col items-center justify-start pt-4 lg:pt-8 opacity-90">
                            <span className="text-green-500 font-black text-[9px] md:text-xs tracking-[0.2em] uppercase mb-1">Proven Gains</span>
                            <svg className="w-32 lg:w-48 h-10 lg:h-14" viewBox="0 0 100 40">
                                <path d="M0,40 L10,32 L20,35 L35,18 L50,22 L65,10 L80,15 L100,2" fill="none" stroke="#22c55e" strokeWidth="2.5" />
                            </svg>
                        </div>

                        <div className="flex-1 flex justify-end pt-2 md:pt-4"> 
                            <a href="https://t.me/deimantas" target="_blank" className="btn-telegram flex items-center justify-center gap-2 text-white px-4 py-2 md:px-6 md:py-3 rounded-xl font-black text-xs md:text-sm uppercase tracking-tighter active:scale-95">
                                <i className="fa-brands fa-telegram text-lg md:text-xl"></i>
                                <span>Join Now</span>
                            </a>
                        </div>
                    </nav>

                    <main className="container mx-auto px-4 pt-0 pb-10 max-w-6xl flex flex-col items-center flex-grow relative z-10">
                        <div className="text-center mb-10 md:mb-12 -mt-2 md:-mt-6">
                            <h1 className="text-3xl md:text-7xl font-black mb-6 leading-[1.1] uppercase text-white">
                                Beat the <span className="text-dimeAccent">Bookie</span> <br/> with Precision
                            </h1>
                            <div className="flex flex-col md:flex-row items-center justify-center gap-3 md:gap-4">
                                <div className="bg-white/5 border border-white/10 text-white px-6 py-3 rounded-xl flex items-center justify-center font-bold backdrop-blur-md">
                                    <i className="fa-solid fa-circle-check text-green-500 mr-2 text-xl"></i>
                                    <span className="uppercase text-[10px] tracking-widest text-gray-400 mr-2">Verified on</span>
                                    <a href="https://dime.blogabet.com" target="_blank" className="uppercase text-[10px] tracking-widest text-green-500 font-black">Blogabet</a>
                                </div>
                                <div className="bg-dimeGreen/20 border border-dimeGreen/40 text-white px-6 py-3 rounded-xl flex items-center justify-center font-bold backdrop-blur-md">
                                    <i className="fa-solid fa-chart-line text-green-500 mr-2 text-xl"></i> 
                                    <span className="uppercase text-[10px] text-gray-400 mr-2">ROI:</span>
                                    <span className="uppercase text-[10px] text-green-500 font-black">{data.stats.roi}</span>
                                    <span className="mx-2 text-gray-400 opacity-30">|</span>
                                    <span className="uppercase text-[10px] text-green-500 font-black">{data.stats.units} Units</span>
                                </div>
                            </div>
                        </div>

                        <div className="w-full glass-card rounded-2xl md:rounded-[2rem] overflow-hidden relative mb-6">
                            <div className="bg-gradient-to-r from-slate-900/80 to-black/80 px-4 py-5 md:px-10 md:py-8 border-b border-white/10 flex justify-between items-center relative z-10">
                                <h2 className="text-lg md:text-2xl font-black uppercase text-white">Archive</h2>
                                <span className="text-dimeAccent font-black text-[10px] md:text-sm uppercase tracking-widest">LAST 10 PICKS</span>
                            </div>
                            <div className="w-full overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-black text-gray-400 text-[9px] md:text-xs uppercase tracking-[0.2em] font-black border-y border-white/10">
                                            <th className="px-3 py-4 md:px-10 md:py-6">Date</th>
                                            <th className="px-2 py-4 md:px-10 md:py-6">Pick</th>
                                            <th className="px-2 py-4 md:px-10 md:py-6">Odds</th>
                                            <th className="px-3 py-4 md:px-10 md:py-6 text-right">Result</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-gray-200">
                                        {data.picks.map((p, i) => (
                                            <tr key={i} className="border-b border-white/[0.04] hover:bg-white/[0.04] transition-all">
                                                <td className="px-3 py-4 md:px-10 md:py-7 text-[10px] md:text-sm text-gray-500">{p.date}</td>
                                                <td className="px-2 py-4 md:px-10 md:py-7 font-black text-[11px] md:text-base uppercase flex items-center">
                                                    {getFlagIcon(p.country)} {p.pick}
                                                </td>
                                                <td className="px-2 py-4 md:px-10 md:py-7 text-dimeGold font-mono font-black">{p.odds}</td>
                                                <td className="px-3 py-4 md:px-10 md:py-7 text-right">
                                                    <span className={`px-2 py-1 md:px-6 md:py-2 rounded-lg font-black text-[10px] md:text-sm border ${p.result === 'W' ? 'bg-green-500/10 text-green-400 border-green-500/30' : 'bg-red-500/10 text-red-400 border-red-500/30'}`}>
                                                        {p.result}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div id="about-section" className="w-full glass-card rounded-2xl md:rounded-[2rem] overflow-hidden relative px-6 py-12 md:px-16 md:py-16 flex flex-col items-center mt-2">
                            <h2 className="text-3xl md:text-5xl font-black text-white uppercase tracking-tight mb-6 text-center leading-tight">
                                10+ Years of <br/> <span className="text-dimeAccent">Data-Driven</span> Dominance
                            </h2>
                            <p className="text-gray-100 text-sm md:text-lg text-center font-medium leading-relaxed mb-10 max-w-2xl">
                                Welcome to DIME Tipster. For over a decade, we have systematically dismantled sportsbooks through deep-level basketball analysis rooted in verified statistics.
                            </p>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-4xl mb-10 mx-auto">
                                <div className="bg-black/40 border border-white/5 rounded-xl p-6 text-center shadow-inner">
                                    <i className="fa-solid fa-calendar-check text-3xl text-dimeGold mb-3"></i>
                                    <div className="text-3xl font-black text-white mb-1">10+</div>
                                    <div className="text-[10px] text-gray-500 uppercase font-bold">Years Profitable</div>
                                </div>
                                <div className="bg-black/40 border border-white/5 rounded-xl p-6 text-center shadow-inner">
                                    <i className="fa-solid fa-shield-halved text-3xl text-green-500 mb-3"></i>
                                    <div className="text-3xl font-black text-white mb-1">100%</div>
                                    <div className="text-[10px] text-gray-500 uppercase font-bold">Verified Tracking</div>
                                </div>
                            </div>
                            <div className="w-full flex flex-col md:flex-row gap-4 mb-12">
                                <div className="flex-1 bg-gradient-to-br from-dimeGreen/20 to-black/60 border border-dimeGreen/30 rounded-2xl p-6">
                                    <h4 className="text-white font-black uppercase mb-2 text-sm">100+ Picks Per Month</h4>
                                    <p className="text-gray-300 text-xs leading-relaxed">Massive season volume of high-value plays meticulously researched.</p>
                                </div>
                                <div className="flex-1 bg-gradient-to-br from-dimeAccent/20 to-black/60 border border-dimeAccent/30 rounded-2xl p-6">
                                    <h4 className="text-white font-black uppercase mb-2 text-sm">100% Risk-Free</h4>
                                    <p className="text-gray-300 text-xs leading-relaxed">If a month ends in negative profit, you receive a full refund.</p>
                                </div>
                            </div>
                            <div className="w-full border-t border-white/10 pt-8 mt-4 overflow-hidden">
                                <h3 className="text-center text-[10px] text-gray-500 uppercase font-black mb-6">DOMINATING GLOBAL MARKETS</h3>
                                <div className="relative flex overflow-x-hidden group bg-black/20 py-4 rounded-xl">
                                    <div className="animate-scroll whitespace-nowrap flex items-center gap-12 px-4">
                                        {doubledLeagues.map((l, i) => (
                                            <div key={i} className="flex items-center gap-3">
                                                <img src={l.logo} alt={l.name} className="w-8 h-8 rounded-full border border-white/20" />
                                                <span className="text-gray-400 font-black text-xs uppercase">{l.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="mt-auto py-10 w-full text-center">
                            <p className="text-gray-500 text-[10px] font-black uppercase tracking-[0.3em]">© 2026 DIME TIPSTER</p>
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
