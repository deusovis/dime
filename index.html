<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="robots" content="noindex, nofollow">
    <title>DIME Tipster | Professional Basketball Analysis & Tips</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkSlate: '#0a0f14',
                        dimeGreen: '#3e6b4d', 
                        dimeGold: '#d4af37',
                        dimeAccent: '#DB9C2A', 
                    },
                    animation: {
                        'bounce-heavy': 'bounceHeavy 0.8s infinite',
                        'spin-ball': 'spinBall 3s linear infinite',
                        'shadow-pulse': 'shadowPulse 0.8s infinite',
                    },
                    keyframes: {
                        bounceHeavy: {
                            '0%, 100%': { 
                                transform: 'translateY(-140%)', 
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)' 
                            },
                            '50%': { 
                                transform: 'translateY(0)', 
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)' 
                            },
                        },
                        spinBall: {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' },
                        },
                        shadowPulse: {
                            '0%, 100%': { 
                                transform: 'scale(0.6)', 
                                opacity: '0.2',
                                animationTimingFunction: 'cubic-bezier(0.8, 0, 1, 1)'
                            },
                            '50%': { 
                                transform: 'scale(1.2)', 
                                opacity: '0.8',
                                animationTimingFunction: 'cubic-bezier(0, 0, 0.2, 1)'

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(circle at top left, #1a2e22 0%, #05070a 100%);
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(62, 107, 77, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .btn-telegram {
            background: linear-gradient(135deg, #2481cc, #1d6fa5);
            box-shadow: 0 4px 20px rgba(36, 129, 204, 0.4);
        }

        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.2));
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Marquee Animation */
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-scroll {
            animation: scroll-left 50s linear infinite; 
            display: flex;
            width: max-content;
        }
        .animate-scroll:hover {
            animation-play-state: paused;
        }

</head>
<body>

        const useLoadingProgress = (isActive, duration = 1200) => {
            const [progress, setProgress] = React.useState(0);
            
            React.useEffect(() => {
                if (!isActive) return;
                
                const startTime = Date.now();
                const interval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const newProgress = Math.min((elapsed / duration) * 100, 100);
                    setProgress(newProgress);
                    
                    if (elapsed >= duration) clearInterval(interval);
                }, 16); 
                
                return () => clearInterval(interval);
            }, [isActive, duration]);
            
            return progress;
        };

                    .then(res => res.json())
                    .then(json => {
                        if (json.stats && json.picks) {
